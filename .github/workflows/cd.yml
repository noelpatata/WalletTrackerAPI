name: CD

on:
  push:
    branches: [main]

jobs:
  trigger-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Check for skip-cd label
        id: check-label
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            const skipCd = prs.data.some(pr => pr.labels.some(l => l.name === 'skip cd'));
            core.setOutput('skip', skipCd ? 'true' : 'false');

      - name: Fetch secrets from Vault
        if: steps.check-label.outputs.skip != 'true'
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.downops.win
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/wallettracker/backend JENKINS_API_TOKEN ;
            secret/data/wallettracker/backend JENKINS_BASE_URL ;
            secret/data/wallettracker/backend JENKINS_CD_SECRET ;
            secret/data/wallettracker/backend JENKINS_USERNAME

      - name: Trigger Jenkins Wallet Tracker CD
        if: steps.check-label.outputs.skip != 'true'
        env:
          GIT_BRANCH: main
        run: |
          curl -u "${{ env.JENKINS_USERNAME }}:${{ env.JENKINS_API_TOKEN }}" \
          "https://${{ env.JENKINS_BASE_URL }}/generic-webhook-trigger/invoke" \
          -H "Authorization: Bearer ${{ env.JENKINS_CD_SECRET }}" \
          --data-urlencode "GIT_BRANCH=$GIT_BRANCH"
