services:
  db:
    container_name: mariadb
    profiles: ["db"]
    build:
      context: ./database
      dockerfile: Dockerfile

    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DATABASE_NAME}

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
    command: >
      sh -c "envsubst < /docker-entrypoint-initdb.d/init.sql.template > /docker-entrypoint-initdb.d/init.sql &&
         exec docker-entrypoint.sh mariadbd"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    container_name: wallettracker
    profiles: ["app"]
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  seeder:
    container_name: seeder
    profiles: ["seeder"]
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      
volumes:
  db_data: